name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: "build-and-test / ${{ matrix.compiler }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc-12
          - clang-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libopenblas-dev \
            gcc-12 g++-12 clang-15

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc-12" ]; then
            echo "CC=gcc-12"   >> "$GITHUB_ENV"
            echo "CXX=g++-12"  >> "$GITHUB_ENV"
          else
            echo "CC=clang-15"   >> "$GITHUB_ENV"
            echo "CXX=clang++-15" >> "$GITHUB_ENV"
          fi

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            build/debug/_deps
            ~/.cache/ccache
          key: "deps-debug-${{ matrix.compiler }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}"
          restore-keys: |
            deps-debug-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Configure (debug)
        run: cmake --preset debug

      - name: Build (debug)
        run: cmake --build --preset debug

      - name: Test (debug)
        run: ctest --preset debug --output-on-failure

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-debug-${{ matrix.compiler }}"
          path: build/debug/Testing/
          retention-days: 7

  build-release:
    name: "build-release / ${{ matrix.compiler }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc-12
          - clang-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libopenblas-dev \
            gcc-12 g++-12 clang-15

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc-12" ]; then
            echo "CC=gcc-12"   >> "$GITHUB_ENV"
            echo "CXX=g++-12"  >> "$GITHUB_ENV"
          else
            echo "CC=clang-15"   >> "$GITHUB_ENV"
            echo "CXX=clang++-15" >> "$GITHUB_ENV"
          fi

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            build/release/_deps
            ~/.cache/ccache
          key: "deps-release-${{ matrix.compiler }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}"
          restore-keys: |
            deps-release-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Configure (release)
        run: cmake --preset release

      - name: Build (release)
        run: cmake --build --preset release

  asan:
    name: "asan / ${{ matrix.compiler }}"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc-12
          - clang-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libopenblas-dev \
            gcc-12 g++-12 clang-15

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc-12" ]; then
            echo "CC=gcc-12"   >> "$GITHUB_ENV"
            echo "CXX=g++-12"  >> "$GITHUB_ENV"
          else
            echo "CC=clang-15"   >> "$GITHUB_ENV"
            echo "CXX=clang++-15" >> "$GITHUB_ENV"
          fi

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            build/asan/_deps
            ~/.cache/ccache
          key: "deps-asan-${{ matrix.compiler }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}"
          restore-keys: |
            deps-asan-${{ matrix.compiler }}-${{ runner.os }}-

      - name: Configure (asan)
        run: cmake --preset asan

      - name: Build (asan)
        run: cmake --build --preset asan

      - name: Test (asan)
        env:
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1"
        run: ctest --test-dir build/asan --output-on-failure

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-asan-${{ matrix.compiler }}"
          path: build/asan/Testing/
          retention-days: 7
